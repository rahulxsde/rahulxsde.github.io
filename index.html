<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rahulkumar Gupta | Fullstack Developer</title>
  <meta name="description" content="Rahulkumar Gupta - Fullstack Developer portfolio.">

  <!-- Open Graph -->
  <meta property="og:title" content="Rahulkumar Gupta | Fullstack Developer">
  <meta property="og:description" content="Portfolio of Rahulkumar Gupta - Fullstack Developer">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rahulxsde.github.io">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Animate.css -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <!-- Typed.js -->
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white flex flex-col min-h-screen overflow-hidden">

  <!-- Background Glow -->
  <div class="absolute w-72 h-72 bg-purple-500/20 rounded-full blur-3xl top-10 left-10"></div>
  <div class="absolute w-72 h-72 bg-blue-500/20 rounded-full blur-3xl bottom-10 right-10"></div>

  <!-- Main -->
  <main class="flex-grow flex items-center justify-center relative z-10">

    <!-- Glass Box -->
    <div class="relative w-[90%] max-w-md p-10 rounded-2xl
                bg-white/10 backdrop-blur-xl border border-white/20
                shadow-2xl
                animate__animated animate__fadeInUp
                hover:scale-105 transition duration-500">

      <!-- Content -->
      <h1 class="text-3xl font-bold mb-1 text-white">
        Rahulkumar Gupta
      </h1>

      <p class="text-sm text-gray-300 mb-6">
        Fullstack developer
      </p>

      <!-- Typing -->
      <p class="absolute bottom-3 right-5 text-xs text-gray-300">
        <span id="typing"></span>
      </p>

    </div>

  </main>

  <!-- Footer -->
  <footer class="text-center text-gray-400 text-sm py-4 z-10">
    © 2026 Rahulkumar Gupta
  </footer>

  <!-- Typed.js -->
  <script>
    new Typed("#typing", {
      strings: ["profile is building....."],
      typeSpeed: 50,
      backSpeed: 20,
      loop: true
    });
  </script>

</body>
</html>
